name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Pinned to match server/Dockerfile
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest --tb=short -v

  deploy:
    name: Trigger Render Deploy
    needs: test
    # Only deploy on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Deploy Hook
        # Render deploy hooks are simple GET requests
        # Note: Render builds its own Docker image from the repo, we are just telling it to start
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set!"
            exit 1
          fi
          echo "Triggering Render deployment..."
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
